# ============================================================================
# Interlock - Docker Compose for local evaluation
# This starts a single Interlock gateway with a persistent local data volume.
# ============================================================================
services:
  interlock:
    image: interlock:local
    build: .
    container_name: interlock
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      LOG_LEVEL: info
      FIREWALL_DB_PATH: /app/data/firewall.db
      SHADOW_SCAN_ENABLED: "false"
    volumes:
      - interlock-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - interlock-net

volumes:
  interlock-data:

networks:
  interlock-net:
    driver: bridge
