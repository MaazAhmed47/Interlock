# ============================================================================
# LLM Firewall — Docker Compose for Local/Small Production
# Use Helm for real production. This is for testing or small deployments.
# ============================================================================
version: '3.9'

services:
  firewall:
    image: llmfirewall/firewall:1.0.0
    build: .
    container_name: llm-firewall
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=info
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - firewall-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - firewall-net

  redis:
    image: redis:7-alpine
    container_name: firewall-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - firewall-net

  nginx:
    image: nginx:alpine
    container_name: firewall-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - firewall
    networks:
      - firewall-net

volumes:
  firewall-data:
  redis-data:

networks:
  firewall-net:
    driver: bridge
