server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Landing page at / ; dashboard SPA at /dashboard with client-side routes.
    location /dashboard {
        try_files $uri $uri/ /dashboard/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
