# ============================================================================
# LLM Firewall — Production Helm Values
# ============================================================================

# ── Image Configuration ──────────────────────────────────────────────────────
image:
  repository: llmfirewall/firewall
  tag: "1.0.0"
  pullPolicy: IfNotPresent
  pullSecrets: []

# ── Replica & Scaling ────────────────────────────────────────────────────────
replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Resource Limits ──────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# ── Service Configuration ────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8001
  annotations: {}

# ── Ingress (for external traffic) ───────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-rps: "100"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.llmfirewall.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: llm-firewall-tls
      hosts:
        - api.llmfirewall.example.com

# ── Secrets (for API keys & upstream LLM keys) ───────────────────────────────
secrets:
  # If true, creates a Kubernetes Secret. If false, you must create it manually.
  create: true
  name: llm-firewall-secrets
  data:
    GROQ_API_KEY: ""
    GEMINI_API_KEY: ""
    OPENAI_API_KEY: ""
    ANTHROPIC_API_KEY: ""
    GOOGLE_API_KEY: ""

# Reference an existing secret instead of creating one (for Vault/external secrets)
existingSecret: ""

# ── ConfigMap (non-sensitive config) ─────────────────────────────────────────
config:
  LOG_LEVEL: "info"
  RATE_LIMIT_FREE: "10"
  RATE_LIMIT_DEVELOPER: "60"
  RATE_LIMIT_TEAM: "300"
  WEBHOOK_TIMEOUT: "5"
  MAX_PROMPT_LENGTH: "10000"
  ENABLE_LEARNING: "true"
  ENABLE_SHADOW_MODE: "true"

# ── Persistence (for learning patterns + audit logs) ─────────────────────────
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /app/data
  annotations: {}

# ── Health Probes ────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: 8001
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8001
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: 8001
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

# ── Security Context ─────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# ── Service Account ──────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ── Node Selection & Affinity ────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - llm-firewall
          topologyKey: kubernetes.io/hostname

# ── Pod Disruption Budget (zero downtime during updates) ─────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# ── Network Policy (lockdown traffic) ────────────────────────────────────────
networkPolicy:
  enabled: true
  ingress:
    # Allow ingress controller to reach pods
    fromIngress: true
  egress:
    # Allow DNS
    allowDNS: true
    # Allow HTTPS to upstream LLM providers
    allowExternalHTTPS: true

# ── Monitoring & Observability ───────────────────────────────────────────────
metrics:
  enabled: true
  serviceMonitor:
    enabled: false  # Set true if Prometheus Operator installed
    interval: 30s
    scrapeTimeout: 10s
    namespace: ""
    labels: {}

# ── Pod Annotations (Prometheus scraping) ────────────────────────────────────
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8001"
  prometheus.io/path: "/metrics"

# ── Environment-specific overrides ───────────────────────────────────────────
env: {}
  # Add custom environment variables here
  # CUSTOM_VAR: "value"

# ── Extra volumes (e.g. for custom CA certs) ─────────────────────────────────
extraVolumes: []
extraVolumeMounts: []
