<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Interlock MCP drift quarantine demo terminal output</title>
  <desc id="desc">Terminal-style screenshot showing clean baseline creation, critical drift detection, quarantine decision, and audit event written.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="0.55" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#05070A"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="20%" cy="22%" r="60%">
      <stop offset="0" stop-color="#00E5C8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00E5C8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect width="1280" height="760" fill="url(#cyanGlow)"/>
  <g opacity="0.08">
    <path d="M0 80H1280M0 160H1280M0 240H1280M0 320H1280M0 400H1280M0 480H1280M0 560H1280M0 640H1280M0 720H1280" stroke="#7AA2F7"/>
    <path d="M80 0V760M160 0V760M240 0V760M320 0V760M400 0V760M480 0V760M560 0V760M640 0V760M720 0V760M800 0V760M880 0V760M960 0V760M1040 0V760M1120 0V760M1200 0V760" stroke="#7AA2F7"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="44" y="44" width="1192" height="672" rx="14" fill="#070B10" stroke="#1E3550" stroke-width="2"/>
    <rect x="44" y="44" width="1192" height="48" rx="14" fill="#0B1B2E"/>
    <circle cx="76" cy="68" r="7" fill="#EF4444"/>
    <circle cx="100" cy="68" r="7" fill="#F59E0B"/>
    <circle cx="124" cy="68" r="7" fill="#22C55E"/>
    <text x="154" y="74" fill="#8CA0B8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" letter-spacing="2">INTERLOCK MCP DRIFT QUARANTINE DEMO</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
    <text x="72" y="134" fill="#22C55E">============================================================</text>
    <text x="72" y="162" fill="#22C55E" font-weight="700">  CLEAN BASELINE CREATED</text>
    <text x="72" y="190" fill="#22C55E">============================================================</text>

    <text x="94" y="226" fill="#2EA8FF">tool</text>
    <text x="320" y="226" fill="#F8FAFC">read_document</text>
    <text x="94" y="254" fill="#2EA8FF">effects</text>
    <text x="320" y="254" fill="#F8FAFC">['read']</text>
    <text x="94" y="282" fill="#2EA8FF">side_effect</text>
    <text x="320" y="282" fill="#F8FAFC">read_only</text>
    <text x="94" y="310" fill="#2EA8FF">externality</text>
    <text x="320" y="310" fill="#F8FAFC">internal</text>

    <text x="72" y="360" fill="#F59E0B">============================================================</text>
    <text x="72" y="388" fill="#F59E0B" font-weight="700">  DRIFT DETECTED</text>
    <text x="72" y="416" fill="#F59E0B">============================================================</text>

    <text x="94" y="452" fill="#2EA8FF">tool</text>
    <text x="320" y="452" fill="#F8FAFC">read_document</text>
    <text x="94" y="480" fill="#2EA8FF">drift_severity</text>
    <text x="320" y="480" fill="#F59E0B" font-weight="700">critical</text>

    <text x="560" y="226" fill="#B8C7DA" font-weight="700">What changed:</text>
    <text x="580" y="258" fill="#F8FAFC">- Schema fields added: ['email', 'include_attachments']</text>
    <text x="580" y="286" fill="#F8FAFC">- High-risk effects added: ['export', 'share']</text>
    <text x="580" y="314" fill="#F8FAFC">- Sensitive data classes added: ['pii']</text>
    <text x="580" y="342" fill="#F8FAFC">- Side effect escalated from read_only to mutating</text>
    <text x="580" y="370" fill="#F8FAFC">- Externality escalated from internal to external</text>

    <text x="560" y="438" fill="#EF4444">================================================</text>
    <text x="560" y="466" fill="#EF4444" font-weight="700">  DECISION: QUARANTINE</text>
    <text x="560" y="494" fill="#EF4444">================================================</text>
    <text x="582" y="532" fill="#2EA8FF">status</text>
    <text x="800" y="532" fill="#F8FAFC">quarantined</text>
    <text x="582" y="560" fill="#2EA8FF">tool calls blocked</text>
    <text x="800" y="560" fill="#F8FAFC">True</text>
    <text x="582" y="602" fill="#EF4444">Tool is quarantined until an operator approves the new schema.</text>

    <text x="72" y="550" fill="#2EA8FF">============================================================</text>
    <text x="72" y="578" fill="#2EA8FF" font-weight="700">  AUDIT EVENT WRITTEN</text>
    <text x="72" y="606" fill="#2EA8FF">============================================================</text>
    <text x="94" y="642" fill="#2EA8FF">matched_rule</text>
    <text x="320" y="642" fill="#F8FAFC">schema_drift_critical</text>
    <text x="94" y="670" fill="#2EA8FF">reason</text>
    <text x="320" y="670" fill="#F8FAFC">external sharing capability and PII data class added</text>
  </g>
</svg>
