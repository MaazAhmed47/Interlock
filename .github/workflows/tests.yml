name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install code quality tools
        run: pip install ruff black==26.3.1 mypy

      - name: Run ruff
        run: ruff check core/ routes/ proxy.py

      - name: Run black
        run: black --check --target-version py312 core/ routes/ proxy.py

      - name: Run mypy
        run: mypy core/ routes/ --ignore-missing-imports

      - name: Compile backend
        run: python -m compileall proxy.py core routes models tests

      # Whole-directory run so new test files can never silently go unrun.
      # tests/test_db.py and tests/test_mcp_db.py are script-style (module-level
      # asserts); pytest executes them at collection import, so an assertion
      # failure in either still fails this step.
      - name: Run backend tests (entire tests/ directory)
        run: python -m pytest tests/ -q

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit

      # Report-only for now: the pinned idna/PyJWT/pytest versions have known
      # advisories (see PR that introduced this step). Remove
      # continue-on-error once those pins are bumped, so new advisories block.
      - name: Audit dependencies (pip-audit, report-only)
        continue-on-error: true
        run: pip-audit --progress-spinner off

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Scans the commits introduced by the push/PR. Known historical findings
      # (all triaged as demo/test placeholder values) do not re-trigger.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  frontend:
    name: Dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: interlock-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: interlock-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build dashboard and landing page
        run: npm run build

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v4.2.0

      - name: Lint chart
        run: helm lint ./helm

      - name: Render production values
        run: helm template interlock ./helm -f ./helm/values-production.example.yaml

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build runtime image
        run: docker build -t interlock:ci .
